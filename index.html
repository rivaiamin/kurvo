<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Kurvo — Web-Based Vector Lineart Engine</title>
    <meta
      name="description"
      content="Kurvo is a web-based vector lineart engine for creating crisp, scalable line art directly in your browser."
    />
    <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />
    <link rel="canonical" href="https://kurvo.app/" />

    <meta name="application-name" content="Kurvo" />
    <meta name="theme-color" content="#0b0f19" />

    <!-- Open Graph (Facebook, LinkedIn, Discord, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Kurvo" />
    <meta property="og:title" content="Kurvo — Web-Based Vector Lineart Engine" />
    <meta
      property="og:description"
      content="Create crisp, scalable vector line art in your browser with Kurvo."
    />
    <meta property="og:url" content="https://kurvo.app/" />
    <meta property="og:image" content="https://kurvo.app/favicon.svg" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Kurvo — Web-Based Vector Lineart Engine" />
    <meta
      name="twitter:description"
      content="Create crisp, scalable vector line art in your browser with Kurvo."
    />
    <meta name="twitter:image" content="https://kurvo.app/favicon.svg" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Kurvo",
        "url": "https://kurvo.app/",
        "applicationCategory": "DesignApplication",
        "operatingSystem": "Web",
        "description": "Kurvo is a web-based vector lineart engine for creating crisp, scalable line art directly in your browser."
      }
    </script>
    <link rel="icon" href="favicon.svg" />

    <style>
      /* Minimal splash overlay before app mounts */
      #kurvo-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        /* background: #0b0f19; */
        background: #ffffff;
        opacity: 1;
        transition: opacity 320ms ease;
      }

      #kurvo-splash__logo {
        width: 92px;
        height: 92px;
        animation: kurvoSplashFloat 900ms ease-in-out infinite alternate;
        will-change: transform;
        filter: drop-shadow(0 18px 28px rgba(0, 0, 0, 0.4));
        user-select: none;
        -webkit-user-drag: none;
      }

      #kurvo-splash.kurvo-splash--hide {
        opacity: 0;
        pointer-events: none;
      }

      @keyframes kurvoSplashFloat {
        from { transform: translateY(0) scale(0.98); }
        to { transform: translateY(-10px) scale(1.02); }
      }

      @media (prefers-reduced-motion: reduce) {
        #kurvo-splash__logo { animation: none; }
        #kurvo-splash { transition: none; }
      }
    </style>
  </head>
  <body>
    <div id="kurvo-splash" aria-hidden="true">
      <img id="kurvo-splash__logo" src="favicon.svg" alt="" />
    </div>
    <div id="root"></div>
    <script>
      // Hide when app signals readiness; also fallback-hide on window load.
      window.__kurvoHideSplash = () => {
        const el = document.getElementById('kurvo-splash')
        if (!el) return
        el.classList.add('kurvo-splash--hide')
        window.setTimeout(() => el.remove(), 450)
      }
      window.addEventListener('load', () => window.setTimeout(() => window.__kurvoHideSplash?.(), 1200))
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
